<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var num_1 = eval(prompt("Introduce el primer numero"));
        var num_2 = eval(prompt("Introduce el segundo numero"));
        for(i=1 ; i<6 ; i++){
            alert("Iteracion numero : "+i)
            switch(i){
                case 1:
                    alert("La suma de los numeros es: "+(num_1+num_2))
                    break;
                case 2: 
                    alert("La resta de los numeros es: "+(num_1-num_2))
                    break;
                case 3: 
                    alert("La multiplicacion de los numeros es: "+(num_1*num_2))
                    break;
                case 4: 
                    alert("La division de los numeros es: "+(num_1/num_2))
                    break;
                case 5: 
                    alert("El mod de los numeros es: "+(num_1%num_2))
                    break;
            }
        }
    </script>
    <!-- TAREA 4 
Crear un página Web que permita:
• El ingreso de 2 números
• Realice un bucle de 5 iteraciones
1. En la PRIMERA iteración: SUMA los 2 valores y muestre el resultado.
2. En la SEGUNDA iteración: RESTA los 2 valores y muestre el resultado.
3. En la TERCERA iteración: MULTIPLICA los 2 valores y muestre el resultado.
4. En la CUARTA iteración: DIVIDE los 2 valores y muestre el resultado.
5. En la QUINTA iteración: MOD(%) los 2 valores y muestre el resultado.-->
</body>
</html>
