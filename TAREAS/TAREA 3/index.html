<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ingreso de Datos de Clientes</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="container">
		<h1>Ingreso de Datos de Clientes</h1>
		<form id="clienteForm">
			<label for="cedula">Cédula:</label>
			<input type="text" id="cedula" name="cedula" required maxlength="10">

			<label for="nombre">Nombre:</label>
			<input type="text" id="nombre" name="nombre" required>

			<label for="direccion">Dirección:</label>
			<input type="text" id="direccion" name="direccion" required>

			<label for="telefono">Teléfono:</label>
			<input type="tel" id="telefono" name="telefono" required maxlength="10">

			<label for="correo">Correo Electrónico:</label>
			<input type="email" id="correo" name="correo" required>

			<button type="submit">Guardar</button>
		</form>
		<div id="resultado"></div>
	</div>
	<script>
		document.getElementById('clienteForm').addEventListener('submit', function(event) {
			event.preventDefault();
			const cedula = document.getElementById('cedula').value;
			const nombre = document.getElementById('nombre').value;
			const direccion = document.getElementById('direccion').value;
			const telefono = document.getElementById('telefono').value;
			const correo = document.getElementById('correo').value;
			let mensaje = `<h2>Datos Guardados</h2><ul>`;
			mensaje += `<li><b>Cédula:</b> ${cedula}</li>`;
			mensaje += `<li><b>Nombre:</b> ${nombre}</li>`;
			mensaje += `<li><b>Dirección:</b> ${direccion}</li>`;
			mensaje += `<li><b>Teléfono:</b> ${telefono}</li>`;
			mensaje += `<li><b>Correo:</b> ${correo}</li>`;
			mensaje += `</ul>`;
			document.getElementById('resultado').innerHTML = mensaje;
			document.getElementById('clienteForm').reset();
		});
	</script>
</body>
</html>
